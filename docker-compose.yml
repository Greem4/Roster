name: roster

# PostgreSQL + API: на B3 (Pi) и локально на Mac для разработки.
# Mac: ./scripts/internal/dev-stack.sh up  |  Pi: docker compose up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-roster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-roster}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-roster} -d ${POSTGRES_DB:-roster}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-roster}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-roster}
      RX_DATABASE_URL: postgresql://${POSTGRES_USER:-roster}:${POSTGRES_PASSWORD}@db:5432/${RX_POSTGRES_DB:-roster_rx}
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
    name: roster_pgdata
