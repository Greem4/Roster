services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./www:/srv/www:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
      - roster

networks:
  web:
    name: server_web
  roster:
    external: true
    name: roster_default

volumes:
  caddy_data:
  caddy_config:
