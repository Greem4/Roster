<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="RosterRx">
  <defs>
    <linearGradient id="bg" x1="4" y1="2" x2="28" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1f1f23"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="pill-l" x1="7" y1="16" x2="16" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="pill-r" x1="16" y1="16" x2="25" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Скруглённая плитка под иконку приложения -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <rect
    width="32"
    height="32"
    rx="8"
    fill="none"
    stroke="#27272a"
    stroke-width="0.75"
  />

  <!-- Капсула (лекарство / Rx) -->
  <g filter="url(#glow)">
    <rect x="10.5" y="14.25" width="11" height="3.5" fill="url(#pill-l)"/>
    <circle cx="11.75" cy="16" r="5.25" fill="url(#pill-l)"/>
    <circle cx="20.25" cy="16" r="5.25" fill="url(#pill-r)"/>
    <line x1="16" y1="10.75" x2="16" y2="21.25" stroke="#042f2e" stroke-width="0.65" opacity="0.35"/>
  </g>

  <!-- Три строки списка (roster) -->
  <g stroke="#5eead4" stroke-linecap="round" stroke-width="1.65" opacity="0.92">
    <line x1="23.25" y1="11.5" x2="27.75" y2="11.5"/>
    <line x1="23.25" y1="16" x2="26.5" y2="16"/>
    <line x1="23.25" y1="20.5" x2="27.25" y2="20.5"/>
  </g>

  <!-- Галочка «выполнено» на средней строке -->
  <path
    d="M22.1 16.05 22.85 16.8 24.35 15.35"
    fill="none"
    stroke="#6ee7b7"
    stroke-width="1.35"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
